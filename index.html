<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#075e54" />
    <title>Tatu - Gestão Financeira Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Inter:wght@300..900&family=Patrick+Hand&family=Caveat:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function () {
        try {
          const storedTheme = localStorage.getItem("theme");
          const supportDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;

          if (storedTheme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Cormorant Garamond", "serif"],
              mono: ["JetBrains Mono", "monospace"],
              handwriting: ["Patrick Hand", "cursive"],
            },
            colors: {
              primary: {
                light: "#A5B4FC",
                DEFAULT: "#6366F1",
                dark: "#4F46E5",
              }, // Indigo vibrante
              navy: "#0B0E14",
              highlight: "#2DD4BF", // Teal para destaque
              secondary: {
                light: "#7DD3FC",
                DEFAULT: "#0EA5E9",
                dark: "#0369A1",
              },
              accent: { light: "#FCD34D", DEFAULT: "#F59E0B", dark: "#D97706" },
              background: "#F8FAFC",
              surface: "#FFFFFF",
              "surface-light": "#F1F5F9",
              "border-color": "#E2E8F0",
              "text-primary": "#0F172A",
              "text-secondary": "#475569",
              "text-muted": "#94A3B8",
              dark: {
                background: "#020617", // Deep Space Blue
                surface: "#0F172A", // Dark Navy
                "surface-light": "#1E293B",
                "border-color": "#334155",
                "text-primary": "#F8FAFC",
                "text-secondary": "#CBD5E1",
                "text-muted": "#64748B",
              },
              success: "#10B981", // Emerald vibrante
              danger: "#EF4444",
              warning: "#F59E0B",
            },
            boxShadow: {
              "glow-primary": "0 0 20px -5px rgba(99, 102, 241, 0.5)",
              "glow-success": "0 0 20px -5px rgba(16, 185, 129, 0.5)",
              "glow-danger": "0 0 20px -5px rgba(244, 63, 94, 0.5)",
            },
            borderRadius: {
              "3xl": "1.5rem",
              "4xl": "2rem",
              "5xl": "3rem",
            },
            animation: {
              "fade-in-up": "fade-in-up 0.5s ease-out",
              "orb-glow": "orb-glow 3s ease-in-out infinite",
              "orb-glow-listening":
                "orb-glow-listening 1s ease-in-out infinite",
              "spin-reverse": "spin-reverse 3s linear infinite",
              "ping-slow": "ping 3s cubic-bezier(0, 0, 0.2, 1) infinite",
            },
            keyframes: {
              "spin-reverse": {
                from: { transform: "rotate(360deg)" },
                to: { transform: "rotate(0deg)" },
              },
              "fade-in-up": {
                "0%": { opacity: "0", transform: "translateY(15px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              "orb-glow": {
                "0%, 100%": { boxShadow: "0 0 20px rgba(99, 102, 241, 0.4)" },
                "50%": { boxShadow: "0 0 40px rgba(99, 102, 241, 0.7)" },
              },
              "orb-glow-listening": {
                "0%, 100%": {
                  boxShadow: "0 0 30px rgba(16, 185, 129, 0.6)",
                  transform: "scale(1)",
                },
                "50%": {
                  boxShadow: "0 0 60px rgba(16, 185, 129, 0.9)",
                  transform: "scale(1.1)",
                },
              },
            },
          },
        },
      };
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
          "framer-motion": "https://esm.sh/framer-motion@11.11.17?external=react,react-dom",
          "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom",
          "@google/genai": "https://esm.sh/@google/genai@1.2.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "xlsx": "https://esm.sh/xlsx@0.18.5"
        }
      }
    </script>
    <style>
      html,
      body {
        overflow-x: hidden;
        width: 100%;
        position: relative;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: none;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        -webkit-text-size-adjust: 100%;
      }
      /* Modern Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #1e293b;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
    </style>
  </head>
  <body class="bg-[#fdfbf7] text-slate-800 antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="bundle.js"></script>
  </body>
</html>
